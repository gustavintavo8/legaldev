name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --frozen --extra dev
      - name: Lint
        run: uv run ruff check app/ tests/
      - name: Format check
        run: uv run ruff format --check app/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --frozen --extra dev
      - name: Run tests with coverage
        run: uv run pytest -v -m "not slow" --cov=app --cov-report=term-missing --cov-fail-under=80
        env:
          GROQ_API_KEY: test-key-not-real

  test-slow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --frozen --extra dev
      - name: Run slow tests
        run: uv run pytest tests/test_e2e.py -v -m slow
        env:
          GROQ_API_KEY: test-key-not-real
