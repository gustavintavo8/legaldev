name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv export --no-hashes --frozen --extra dev -o /tmp/ci-deps.txt && pip install -r /tmp/ci-deps.txt
      - name: Lint
        run: ruff check app/ tests/
      - name: Format check
        run: ruff format --check app/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv export --no-hashes --frozen --extra dev -o /tmp/ci-deps.txt && pip install -r /tmp/ci-deps.txt
      - name: Run tests with coverage
        run: pytest -v --cov=app --cov-report=term-missing --cov-fail-under=80
        env:
          GROQ_API_KEY: test-key-not-real
