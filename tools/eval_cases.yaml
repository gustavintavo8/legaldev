base_input:
  tipo_proyecto: app_web
  descripcion_breve: App de gestión de tareas
  tiene_usuarios_registrados: true
  acceso_publico: false
  tipos_datos_personales:
    - email
  usuarios_menores: false
  usuarios_ue: true
  transferencia_datos_terceros: false
  usa_ia: false
  tipo_ia: null
  usa_cookies: false
  monetizacion: null
  contenido_digital: false
  ccaa: Madrid
  es_empresa: false
  colegiado: null

cases:
  - label: rgpd-lopdgdd-basico
    notes: "App web básica con datos personales de usuarios EU"
    overrides:
      tipos_datos_personales: [email, nombre]
    expected:
      - RGPD
      - LOPDGDD
    negative_expected:
      - Adecuación al RGPD de tratamientos que incorporan IA - AEPD
      - IA Agentica desde la perspectiva de proteccion de datos - AEPD

  - label: datos-sensibles-salud
    notes: "Datos de salud — categoría especial Art. 9 RGPD"
    overrides:
      tipos_datos_personales: [salud, nombre, email]
    expected:
      - RGPD
      - LOPDGDD
    negative_expected:
      - Adecuación al RGPD de tratamientos que incorporan IA - AEPD
      - IA Agentica desde la perspectiva de proteccion de datos - AEPD

  - label: ia-generativa
    notes: "App con IA generativa — aplica EU AI Act"
    overrides:
      usa_ia: true
      tipo_ia: generativa
      tipos_datos_personales: [email]
    expected:
      - EU AI Act
    negative_expected:
      - IA Agentica desde la perspectiva de proteccion de datos - AEPD
      # Adecuación RGPD+IA NO es negativo aquí — legítima para proyectos generativos
      # Fix futuro debe filtrar IA Agéntica por tipo_ia=agentes, no por usa_ia

  - label: ia-agente
    notes: "App con IA agéntica — EU AI Act + guía AEPD sobre IA agéntica"
    overrides:
      usa_ia: true
      tipo_ia: agentes
      tipos_datos_personales: [email]
    expected:
      - EU AI Act
      - IA Agentica desde la perspectiva de proteccion de datos - AEPD
    negative_expected: []

  - label: menores-datos-personales
    notes: "App con usuarios menores — protección reforzada RGPD Art. 8"
    overrides:
      usuarios_menores: true
      tipos_datos_personales: [nombre, email]
    expected:
      - RGPD
      - LOPDGDD
    negative_expected:
      - Adecuación al RGPD de tratamientos que incorporan IA - AEPD
      - IA Agentica desde la perspectiva de proteccion de datos - AEPD

  - label: cookies-webapp
    notes: "App con cookies — búsqueda auxiliar activa (usa_cookies=True)"
    overrides:
      usa_cookies: true
    expected:
      - Guía sobre uso de cookies - AEPD
      - LSSI
    negative_expected:
      - Adecuación al RGPD de tratamientos que incorporan IA - AEPD
      - IA Agentica desde la perspectiva de proteccion de datos - AEPD
      - Digital Services Act (Reglamento UE 2022-2065)

  - label: ccii-ingeniero-colegiado
    notes: "Ingeniero informático colegiado — búsqueda auxiliar CCII"
    overrides:
      colegiado: true
      es_empresa: false
    expected:
      - Código Ético y Deontológico CCII
    negative_expected:
      - IA Agentica desde la perspectiva de proteccion de datos - AEPD
      # LSSI (14 chunks) NO es FP — legítima para colegiado con servicios web con usuarios

  - label: query-compleja-rgpd-colegiado-ia
    notes: "Query compleja — colegiado + IA + 4 tipos de datos. RGPD requiere búsqueda auxiliar."
    overrides:
      descripcion_breve: "App de gestión de equipos con seguimiento de jugadores"
      tipos_datos_personales: [nombre, email, telefono, ubicacion]
      usa_ia: true
      tipo_ia: recomendacion
      usa_cookies: true
      colegiado: true
      ccaa: Asturias
    expected:
      - RGPD
      - LOPDGDD
      - LSSI
    negative_expected:
      - Digital Services Act (Reglamento UE 2022-2065)

  - label: lssi-web-publica
    notes: >
      Web publica sin cookies — ejerce la rama LSSI acceso_publico.
      Condicion: tipo_proyecto=app_web AND acceso_publico=True (no usa_cookies).
      Verifica que la inyeccion de LSSI funciona por la rama acceso_publico,
      no por cookies.
    overrides:
      acceso_publico: true
      usa_cookies: false
    expected:
      - RGPD
      - LSSI
    negative_expected:
      - Adecuación al RGPD de tratamientos que incorporan IA - AEPD
      - IA Agentica desde la perspectiva de proteccion de datos - AEPD

  - label: sin-datos-personales
    notes: >
      Caso "developer confundido": declara tipos_datos_personales=[ninguno] pero
      tiene_usuarios_registrados=true — registro implica email = dato personal.
      Objetivo: verificar que el sistema es conservador (RGPD/LOPDGDD pueden
      aparecer legítimamente). Negativos: solo docs de IA, que no aplican en
      ningún escenario sin usa_ia.
    off_topic: true
    overrides:
      tipos_datos_personales: [ninguno]
    expected: []
    negative_expected:
      - Adecuación al RGPD de tratamientos que incorporan IA - AEPD
      - IA Agentica desde la perspectiva de proteccion de datos - AEPD

  - label: off-topic-recetas
    notes: >
      App fuera de dominio legal: sin usuarios registrados, sin datos personales.
      Negativos activos hoy: LOPDGDD (9 chunks) y Adecuación RGPD+IA (1 chunk).
      Negativos preventivos (0 chunks hoy, guardia ante regresiones si el umbral baja):
      RGPD e IA Agéntica AEPD.
    off_topic: true
    overrides:
      descripcion_breve: "App de recetas de cocina sin usuarios registrados"
      tipos_datos_personales: [ninguno]
      tiene_usuarios_registrados: false
    expected: []
    negative_expected:
      - LOPDGDD
      - Adecuación al RGPD de tratamientos que incorporan IA - AEPD
      - RGPD
      - IA Agentica desde la perspectiva de proteccion de datos - AEPD

  - label: probe-8-plantas-dominio-lejano
    notes: >
      Dominio lejano con datos personales (probe 8 original). Red social para plantas:
      sin vocabulario legal, pero recoge nombre y email -> RGPD debe inyectarse
      incondicionalmente. Este caso verifica el fix P3 (Task 2.1 Sprint 2):
      la INJECTION no puede depender del score del dominio.
      Stems verificados empíricamente: RGPD=3 chunks, LSSI=2 chunks (ambos inyectados).
      LOPDGDD=1 chunk (no llega a >=2, no aparece en normativas_detectadas).
    overrides:
      descripcion_breve: "Red social para amantes de las plantas donde la gente comparte fotos y consejos sobre sus plantas"
      tipos_datos_personales: [nombre, email]
      tiene_usuarios_registrados: true
      acceso_publico: true
      usa_cookies: true
    expected:
      - RGPD
      - LSSI
    negative_expected:
      - Adecuación al RGPD de tratamientos que incorporan IA - AEPD
      - IA Agentica desde la perspectiva de proteccion de datos - AEPD

  - label: sin-ia-sin-cookies-app-basica
    notes: >
      App básica sin IA, sin cookies, con datos personales básicos.
      Verifica que el umbral P2a funciona: normativas con <2 chunks
      no aparecen en normativas_detectadas (fix Task 2.2 Sprint 2).
      RGPD debe aparecer (injection garantiza >=2 chunks para RGPD).
      Stems verificados empíricamente: RGPD=3 chunks, LOPDGDD=3 chunks.
      Sin 1-chunk normativas — P2a threshold no produce falsos positivos aquí.
    overrides:
      tipos_datos_personales: [email]
      usa_ia: false
      usa_cookies: false
      acceso_publico: false
    expected:
      - RGPD
    negative_expected:
      - Adecuación al RGPD de tratamientos que incorporan IA - AEPD
      - IA Agentica desde la perspectiva de proteccion de datos - AEPD
